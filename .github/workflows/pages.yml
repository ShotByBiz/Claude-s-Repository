name: Build dashboard

# Validates the dashboard and publishes it as a downloadable artifact.
# No GitHub Pages deploy here: Pages is served in "branch" mode straight
# from the repo (Settings -> Pages), which is independent of Actions. Tying
# the job to the github-pages environment caused startup failures on
# non-default branches due to environment protection rules, so it's gone.

on:
  push:
    branches: [main, claude/cowork-monitoring-dashboard-lv622u]
    paths: ["dashboard/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Generate dashboard data from git history
        run: python3 dashboard/generate_status.py
      - name: Validate dashboard
        run: |
          python3 -c "import json; json.load(open('dashboard/data/status.json')); print('status.json OK')"
          python3 -c "import json; json.load(open('dashboard/data/pending.json')); print('pending.json OK')"
          test -f dashboard/index.html
          test -f dashboard/assets/dashboard.js
          test -f dashboard/assets/dashboard.css
      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: cowork-dashboard
          path: dashboard
