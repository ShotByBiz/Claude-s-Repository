name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main, claude/cowork-monitoring-dashboard-lv622u]
    paths: ["dashboard/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Generate dashboard data from git history
        run: python3 dashboard/generate_status.py
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard
      - id: deployment
        uses: actions/deploy-pages@v4
