<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cowork Process Monitor</title>
  <link rel="stylesheet" href="assets/dashboard.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <h1>Cowork Process Monitor</h1>
    </div>
    <div class="mode" id="modeBadge">…</div>
  </header>

  <main id="app">
    <p class="loading" id="loading">Loading status…</p>

    <section class="mode-note" id="modeNote" hidden></section>

    <section class="cards" id="cards" hidden></section>

    <section class="grid">
      <div class="panel" id="trendPanel" hidden>
        <h2>Efficiency trend</h2>
        <canvas id="trend" width="600" height="180" aria-label="Efficiency trend chart"></canvas>
      </div>
      <div class="panel" id="areasPanel" hidden>
        <h2>Work areas</h2>
        <div id="areas"></div>
      </div>
    </section>

    <section class="panel" id="procPanel" hidden>
      <h2>Processes</h2>
      <table id="procTable">
        <thead>
          <tr><th>Process</th><th>Area</th><th>Status</th><th>Health</th><th>Throughput</th><th>Last tick</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section class="panel" id="taskPanel" hidden>
      <h2>Tasks</h2>
      <table id="taskTable">
        <thead><tr><th>Task</th><th>Area</th><th>Status</th><th>Permission</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <footer class="footer">
    <span id="generatedAt">—</span>
    <button id="refresh" type="button">Refresh</button>
  </footer>

  <script src="assets/dashboard.js"></script>
</body>
</html>
